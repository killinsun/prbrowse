name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            target: darwin-arm64
          - os: macos-13
            target: darwin-amd64
          - os: ubuntu-latest
            target: linux-amd64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      - name: Compile
        run: |
          mkdir -p dist
          bun build --compile --outfile "dist/prbrowse" src/cli.tsx
          chmod +x dist/prbrowse

      - name: Package
        run: |
          cd dist
          tar -czf "../prbrowse-${{ matrix.target }}.tar.gz" prbrowse
          cd ..
          shasum -a 256 "prbrowse-${{ matrix.target }}.tar.gz" > "prbrowse-${{ matrix.target }}.sha256"

      - uses: actions/upload-artifact@v4
        with:
          name: prbrowse-${{ matrix.target }}
          path: |
            prbrowse-${{ matrix.target }}.tar.gz
            prbrowse-${{ matrix.target }}.sha256

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="${GITHUB_REF_NAME}"
          gh release create "$tag" \
            --title "$tag" \
            --generate-notes \
            artifacts/prbrowse-*.tar.gz \
            artifacts/prbrowse-*.sha256
