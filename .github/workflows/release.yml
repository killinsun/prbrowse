name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - bun_target: bun-darwin-arm64
            asset: darwin-arm64
          - bun_target: bun-darwin-x64
            asset: darwin-amd64
          - bun_target: bun-linux-x64
            asset: linux-amd64

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      - name: Compile
        run: |
          mkdir -p dist
          bun build --compile --target="${{ matrix.bun_target }}" \
            --outfile "dist/prbrowse" src/cli.tsx
          chmod +x dist/prbrowse

      - name: Package
        run: |
          cd dist
          tar -czf "../prbrowse-${{ matrix.asset }}.tar.gz" prbrowse
          cd ..
          shasum -a 256 "prbrowse-${{ matrix.asset }}.tar.gz" \
            > "prbrowse-${{ matrix.asset }}.sha256"

      - uses: actions/upload-artifact@v4
        with:
          name: prbrowse-${{ matrix.asset }}
          path: |
            prbrowse-${{ matrix.asset }}.tar.gz
            prbrowse-${{ matrix.asset }}.sha256

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="${GITHUB_REF_NAME}"
          # Recreate if a previous attempt left a draft/empty release
          if gh release view "$tag" >/dev/null 2>&1; then
            gh release delete "$tag" --yes || true
          fi
          gh release create "$tag" \
            --title "$tag" \
            --generate-notes \
            artifacts/prbrowse-*.tar.gz \
            artifacts/prbrowse-*.sha256
